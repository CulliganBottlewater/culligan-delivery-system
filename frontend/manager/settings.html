<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>System Settings</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    label {
      font-weight: bold;
      display: block;
      margin-top: 15px;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }
    textarea {
      height: 120px;
    }
    button {
      margin-top: 20px;
      padding: 10px 16px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background: #0d47a1;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <h1>System Settings</h1>

    <label>Manager Email:</label>
    <input type="email" id="managerEmail">

    <label>Starting Slip Number:</label>
    <input type="number" id="startingSlipNumber">

    <label>
      <input type="checkbox" id="autoEmailSlips">
      Auto‑Email Delivery Slips
    </label>

    <label>
      <input type="checkbox" id="requireEmailConfirmation">
      Require Driver Confirmation Before Emailing
    </label>

    <label>Email Subject Template:</label>
    <input type="text" id="emailSubjectTemplate">

    <label>Email Body Template:</label>
    <textarea id="emailBodyTemplate"></textarea>

    <label>Company Name:</label>
    <input type="text" id="companyName">

    <label>Company Location:</label>
    <input type="text" id="companyLocation">

    <button id="btnSave">Save Settings</button>
  </div>

  <script src="../shared/storage.js"></script>
  <script src="../shared/ui.js"></script>
  <script src="settings.js"></script>
</body>
</html>
